<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACGN 次元人格鉴定手册</title>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'neo-cyan': '#00f0ff',
        'sakura': '#ff2a85',
        'gold': '#f39c12',
        'dark-bg': '#121820',
        'card-bg': '#1a2530',
      },
      fontFamily: {
        sans: ['"Noto Sans SC"', '"Microsoft YaHei"', 'sans-serif'],
      },
      animation: {
        'float': 'float 3s ease-in-out infinite',
        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
        'slide-in-right': 'slideInRight 0.5s ease-out',
        'slide-out-left': 'slideOutLeft 0.5s ease-in',
        'fade-in': 'fadeIn 0.6s ease-out',
        'fade-in-up': 'fadeInUp 0.6s ease-out',
        'spin-slow': 'spin 4s linear infinite',
        'particle-rise': 'particleRise 8s linear infinite',
      },
      keyframes: {
        float: {
          '0%, 100%': { transform: 'translateY(0px)' },
          '50%': { transform: 'translateY(-10px)' },
        },
        glowPulse: {
          '0%, 100%': { boxShadow: '0 0 10px rgba(0,240,255,0.3)' },
          '50%': { boxShadow: '0 0 25px rgba(0,240,255,0.6)' },
        },
        slideInRight: {
          '0%': { transform: 'translateX(100%)', opacity: '0' },
          '100%': { transform: 'translateX(0)', opacity: '1' },
        },
        slideOutLeft: {
          '0%': { transform: 'translateX(0)', opacity: '1' },
          '100%': { transform: 'translateX(-100%)', opacity: '0' },
        },
        fadeIn: {
          '0%': { opacity: '0' },
          '100%': { opacity: '1' },
        },
        fadeInUp: {
          '0%': { transform: 'translateY(30px)', opacity: '0' },
          '100%': { transform: 'translateY(0)', opacity: '1' },
        },
        particleRise: {
          '0%': { transform: 'translateY(100vh) scale(0)', opacity: '0' },
          '10%': { opacity: '1' },
          '90%': { opacity: '1' },
          '100%': { transform: 'translateY(-10vh) scale(1)', opacity: '0' },
        },
      },
    },
  },
};
</script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
/* ============ 全局基础样式 ============ */
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  background: #121820;
  color: #e0e0e0;
  margin: 0;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ============ Canvas 粒子背景 ============ */
#particleCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ============ 主容器 ============ */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============ 页面面板通用 ============ */
.page-panel {
  display: none;
  width: 100%;
  max-width: 720px;
  padding: 20px;
  margin: 0 auto;
}
.page-panel.active {
  display: block;
  animation: fadeIn 0.5s ease-out;
}

/* ============ 玻璃卡片 ============ */
.glass-card {
  background: rgba(26, 37, 48, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  padding: 36px 28px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  transition: all 0.3s ease;
}

/* ============ 霓虹文字 ============ */
.neon-text {
  text-shadow: 0 0 10px rgba(0, 240, 255, 0.6), 0 0 30px rgba(0, 240, 255, 0.3);
}
.neon-text-pink {
  text-shadow: 0 0 10px rgba(255, 42, 133, 0.6), 0 0 30px rgba(255, 42, 133, 0.3);
}
.neon-text-gold {
  text-shadow: 0 0 10px rgba(243, 156, 18, 0.6), 0 0 30px rgba(243, 156, 18, 0.3);
}

/* ============ 上传区域 ============ */
.upload-zone {
  border: 2px dashed rgba(0, 240, 255, 0.3);
  border-radius: 20px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.35s ease;
  background: rgba(0, 240, 255, 0.03);
  position: relative;
  overflow: hidden;
}
.upload-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,240,255,0.08) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.35s ease;
}
.upload-zone:hover {
  border-color: rgba(0, 240, 255, 0.7);
  background: rgba(0, 240, 255, 0.06);
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
}
.upload-zone:hover::before { opacity: 1; }
.upload-zone.drag-over {
  border-color: #00f0ff;
  background: rgba(0, 240, 255, 0.1);
  box-shadow: 0 0 40px rgba(0, 240, 255, 0.25);
  transform: scale(1.02);
}

/* ============ 按钮样式 ============ */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 32px;
  border-radius: 14px;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.5px;
  cursor: pointer;
  border: none;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
  color: #fff;
  background: linear-gradient(135deg, #00f0ff 0%, #0099cc 100%);
  box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
}
.btn-primary:hover {
  box-shadow: 0 6px 30px rgba(0, 240, 255, 0.5);
  transform: translateY(-2px);
}
.btn-primary:active {
  transform: scale(0.95);
  box-shadow: 0 2px 10px rgba(0, 240, 255, 0.2);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 32px;
  border-radius: 14px;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: all 0.25s ease;
  color: #e0e0e0;
  background: rgba(255, 255, 255, 0.05);
}
.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.35);
  transform: translateY(-2px);
}
.btn-secondary:active { transform: scale(0.95); }

.btn-sakura {
  background: linear-gradient(135deg, #ff2a85 0%, #cc0066 100%);
  box-shadow: 0 4px 20px rgba(255, 42, 133, 0.3);
}
.btn-sakura:hover {
  box-shadow: 0 6px 30px rgba(255, 42, 133, 0.5);
}

.btn-gold {
  background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
  box-shadow: 0 4px 20px rgba(243, 156, 18, 0.3);
}
.btn-gold:hover {
  box-shadow: 0 6px 30px rgba(243, 156, 18, 0.5);
}

/* ============ 选项卡片 ============ */
.option-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border-radius: 16px;
  border: 1.5px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.option-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,240,255,0.08) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.option-card:hover {
  border-color: rgba(0, 240, 255, 0.4);
  background: rgba(0, 240, 255, 0.06);
  transform: translateY(-3px);
  box-shadow: 0 6px 24px rgba(0, 240, 255, 0.12);
}
.option-card:hover::before { opacity: 1; }
.option-card.selected {
  border-color: #00f0ff;
  background: rgba(0, 240, 255, 0.12);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
  transform: scale(1.02);
}
.option-card.selected .option-letter {
  background: #00f0ff;
  color: #121820;
  box-shadow: 0 0 14px rgba(0, 240, 255, 0.5);
}
.option-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.08);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
  transition: all 0.3s ease;
  border: 1px solid rgba(255, 255, 255, 0.15);
}
.option-text {
  flex: 1;
  font-size: 15px;
  line-height: 1.5;
  color: #c8c8d0;
}

/* ============ 进度条 ============ */
.progress-bar-bg {
  width: 100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, #00f0ff, #ff2a85);
  box-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============ 加载动画 - 魔法阵 ============ */
.magic-circle {
  width: 60px;
  height: 60px;
  border: 3px solid rgba(0, 240, 255, 0.2);
  border-top-color: #00f0ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  position: relative;
}
.magic-circle::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 2px solid rgba(255, 42, 133, 0.2);
  border-top-color: #ff2a85;
  border-radius: 50%;
  animation: spin 1.5s linear infinite reverse;
}
.magic-circle::after {
  content: '✦';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 18px;
  color: #f39c12;
  animation: glowPulse 2s ease-in-out infinite;
}

/* ============ 结果页雷达图容器 ============ */
.radar-container {
  position: relative;
  max-width: 400px;
  margin: 0 auto;
}
.radar-container canvas {
  filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.3));
}

/* ============ 角色立绘 ============ */
.character-portrait {
  max-width: 280px;
  width: 100%;
  border-radius: 20px;
  border: 2px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 240, 255, 0.15);
  object-fit: cover;
  aspect-ratio: 3/4;
  background: rgba(0,0,0,0.3);
}

/* ============ 结果按钮 ============ */
.result-type-badge {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 24px;
  border: 1.5px solid rgba(0, 240, 255, 0.4);
  background: rgba(0, 240, 255, 0.08);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 2px;
  color: #00f0ff;
}

/* ============ 打印样式 ============ */
@media print {
  body { background: #fff !important; color: #000 !important; }
  #particleCanvas { display: none !important; }
  .glass-card {
    background: #fff !important;
    border: 2px solid #000 !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
  }
  .btn-primary, .btn-secondary, .btn-sakura, .btn-gold,
  #btn-back, #btn-restart-result, #btn-save-result {
    display: none !important;
  }
  .neon-text, .neon-text-pink, .neon-text-gold {
    text-shadow: none !important;
    color: #000 !important;
  }
  .result-type-badge {
    border-color: #000 !important;
    color: #000 !important;
    background: #eee !important;
  }
  .character-portrait {
    border: 2px solid #000 !important;
    box-shadow: none !important;
  }
  @page { margin: 1cm; }
}

/* ============ 响应式微调 ============ */
@media (max-width: 640px) {
  .glass-card { padding: 24px 16px; border-radius: 18px; }
  .option-card { padding: 14px 16px; }
  .option-text { font-size: 14px; }
  .btn-primary, .btn-secondary { padding: 12px 24px; font-size: 14px; width: 100%; }
  .upload-zone { padding: 32px 16px; }
}
</style>
</head>
<body>

<!-- 粒子背景 Canvas -->
<canvas id="particleCanvas"></canvas>

<!-- 应用主体 -->
<div id="app">

  <!-- ==================== 页面 1：欢迎页 ==================== -->
  <div class="page-panel active" id="page-welcome">
    <div class="glass-card text-center">
      <!-- 标题 -->
      <div class="mb-2 text-5xl font-black tracking-wider neon-text" style="background: linear-gradient(135deg, #00f0ff, #ff2a85); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        ACGN
      </div>
      <h1 class="text-2xl md:text-3xl font-bold mb-2 text-white">次元人格鉴定手册</h1>
      <p class="text-sm text-gray-400 mb-2">平衡调优版 · 强化心理学互斥性，还原最真实的次元底色</p>
      <p class="text-xs text-gray-600 mb-8">16 道沉浸式 ACGN 场景题 · 4 大维度精准鉴定</p>

      <!-- 测试说明 -->
      <div class="text-left text-sm text-gray-400 mb-8 p-4 rounded-xl" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);">
        <p class="mb-2 font-medium text-gray-300">测评说明</p>
        <p>请完全把自己代入题干所述的场景与立场中，凭第一本能做出选择。记录每题你所选的选项（A / B / C / D），完成后系统将自动计算你的四位次元人格代码。</p>
      </div>

      <!-- 开始测试按钮 -->
      <button class="btn-sakura btn-primary w-full mb-3" id="btnStartQuiz" type="button">
        <i data-lucide="play" class="w-5 h-5"></i>
        开始次元鉴定
      </button>

      <!-- 恢复进度按钮 -->
      <button class="btn-gold btn-primary w-full hidden" id="btnResume" type="button">
        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
        恢复上次答题进度
      </button>
    </div>
  </div>

  <!-- ==================== 页面 2：答题页 ==================== -->
  <div class="page-panel" id="page-quiz">
    <div class="glass-card">
      <!-- 进度指示器 -->
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm text-gray-400" id="quizProgressLabel">进度: 第 1 / 16 题</span>
        <span class="text-xs text-gray-500" id="quizDimension"></span>
      </div>
      <div class="progress-bar-bg mb-6">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
      </div>

      <!-- 题目区 -->
      <div id="questionArea">
        <h2 class="text-xl md:text-2xl font-bold text-white mb-2" id="questionTitle"></h2>
        <p class="text-sm text-gray-500 italic mb-6 leading-relaxed" id="questionContext"></p>
      </div>

      <!-- 选项区 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6" id="optionsContainer"></div>

      <!-- 选中后的反馈文字 -->
      <div id="selectionFeedback" class="hidden text-center text-sm text-neo-cyan mb-4 animate-fade-in"></div>

      <!-- 底部控制 -->
      <div class="flex items-center justify-between gap-3">
        <button class="btn-secondary text-sm" id="btnPrev" type="button">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          上一题
        </button>
        <span class="text-xs text-gray-600" id="answerStatus"></span>
        <div class="w-20"></div>
      </div>
    </div>
  </div>

  <!-- ==================== 页面 3：结果页 ==================== -->
  <div class="page-panel" id="page-result">
    <div class="glass-card text-center">
      <!-- 人格类型 -->
      <div class="result-type-badge mb-3" id="resultBadge"></div>
      <h1 class="text-3xl md:text-4xl font-black text-white mb-1 neon-text" id="resultType"></h1>

      <!-- 角色信息 -->
      <div class="flex justify-center mb-4">
        <img class="character-portrait" id="characterImage" alt="角色立绘" src="">
      </div>
      <h2 class="text-xl md:text-2xl font-bold neon-text-gold mb-1" id="characterName"></h2>
      <p class="text-sm text-sakura font-medium mb-1 hidden" id="characterTitle"></p>
      <p class="text-sm text-gray-400 italic mb-2" id="characterQuote"></p>
      <p class="text-sm text-gray-300 leading-relaxed mb-6 max-w-md mx-auto" id="characterDesc"></p>

      <!-- 雷达图 -->
      <div class="radar-container mb-6">
        <canvas id="radarChart"></canvas>
      </div>

      <!-- 维度详情 -->
      <div class="grid grid-cols-2 gap-2 mb-6 text-left" id="dimensionDetails"></div>

      <!-- 操作按钮 -->
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button class="btn-sakura btn-primary" id="btnRestart" type="button">
          <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
          重新测试
        </button>
        <button class="btn-gold btn-primary" id="btnSaveResult" type="button">
          <i data-lucide="download" class="w-5 h-5"></i>
          保存结果卡片
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== 加载覆盖层 ==================== -->
  <div class="page-panel hidden" id="page-loading" style="display:none;">
    <div class="glass-card text-center flex flex-col items-center justify-center py-12">
      <div class="magic-circle mb-6"></div>
      <p class="text-base text-gray-300" id="loadingText">正在解析次元通道...</p>
    </div>
  </div>

</div>

<script>
// ============================================================
//  全局状态管理
// ============================================================
const STATE = {
  questions: [],          // 解析后的题目数组
  answers: [],            // 用户答案数组 [{questionIndex, optionLetter}]
  currentQuestion: 0,     // 当前题目索引
  totalQuestions: 16,
  mbtiResult: null,       // 计算结果 {type, scores}
  isTransitioning: false, // 是否正在切换题目动画中
};

// ============================================================
//  题库（来自 PDF 问卷：ACGN 次元人格鉴定手册 平衡调优版）
//  16 道基于真实 ACGN 场景的深度人格偏好测试题
// ============================================================
const DEFAULT_QUESTIONS = [
  {
    id: 1,
    stem: '悬浮城艾恩葛朗特的起始城镇广场',
    context: '冰冷的系统公告在天空中回荡，原本热闹的出生地瞬间被恐慌吞噬，周围人群有的跪地痛哭，有的盲目狂奔。此时你会：',
    options: [
      { letter: 'A', text: '强行压下内心的不安，立刻站上高台大声呼喊，承担起重组秩序与安抚大众的沉重责任。' },
      { letter: 'B', text: '迅速在混乱中游走，主动接触几个看起来冷静的玩家，极力游说他们组成利益共同体。' },
      { letter: 'C', text: '保持沉默退到阴影中，冷眼观察周围人的崩溃，暗中评估哪些人会成为日后的隐患。' },
      { letter: 'D', text: '压低兜帽，趁大部队还在推搡，一言不发地拨开人群，独自冲向城外抢占资源。' },
    ],
    dimension: 'E/I',
    source: '《刀剑神域》',
  },
  {
    id: 2,
    stem: '炽热喧嚣的东京体育馆排球场',
    context: '比分咬死在最后的死局，胜负全在一球之间。作为球场上的核心成员之一，你此时最渴望通过何种方式介入？',
    options: [
      { letter: 'A', text: '眼神坚定地向二传手要球，渴望在全场的欢呼声中，顶着巨大的高压亲手扣下制胜一球。' },
      { letter: 'B', text: '积极跑动拉开防线，向身边的队友高声喊话调整气势，用自己外放的情绪感染整个团队。' },
      { letter: 'C', text: '在起跳的刹那保持绝对的冷酷，用极其隐蔽的假动作偏过防守队员，将球轻吊到空档。' },
      { letter: 'D', text: '摒弃外界的噪音，专注于自己负责的边缘防守区域，在无声中完成最严密的一次接发。' },
    ],
    dimension: 'E/I',
    source: '《排球少年！！》',
  },
  {
    id: 3,
    stem: '巨兽横行的太古之岛小花园海岸',
    context: '远航的船只终于在浓雾散去后靠岸，眼前是一片完全没有记载的奇幻原始陆地。当船长发出探索许可时，你倾向于：',

// ============================================================
//  页面切换

function showPage(page) {
  [pageWelcome, pageQuiz, pageResult, pageLoading].forEach(p => {
    p.classList.remove('active');
    if (p === pageLoading) {
      p.style.display = 'none';
    }
  });
  if (page === pageLoading) {
    page.style.display = 'flex';
    page.style.alignItems = 'center';
    page.style.justifyContent = 'center';
    page.style.minHeight = '100vh';
  }
  page.classList.add('active');
}

// ============================================================
//  加载动画
// ============================================================
function showLoading(text) {
  loadingText.textContent = text || '正在解析次元通道...';
  showPage(pageLoading);
}
function hideLoading() {
  pageLoading.style.display = 'none';
  pageLoading.classList.remove('active');
}

// ============================================================
//  Toast 提示
// ============================================================
function showToast(message, duration = 2500) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.textContent = message;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '30px', left: '50%', transform: 'translateX(-50%)',
    background: 'rgba(0,240,255,0.15)', backdropFilter: 'blur(10px)',
    border: '1px solid rgba(0,240,255,0.3)', borderRadius: '12px',
    padding: '12px 24px', color: '#00f0ff', fontSize: '14px', fontWeight: '500',
    zIndex: '9999', animation: 'fadeInUp 0.4s ease-out',
    boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
  });
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ============================================================

// ============================================================
function checkResume() {
  const saved = localStorage.getItem('mbti_quiz_state');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.questions && data.answers && data.currentQuestion !== undefined) {
        btnResume.classList.remove('hidden');
        btnResume.onclick = () => {
          STATE.questions = data.questions;
          STATE.answers = data.answers;
          STATE.currentQuestion = data.currentQuestion;
          STATE.totalQuestions = data.questions.length;
          showToast('已恢复上次答题进度');
          renderQuiz();
          showPage(pageQuiz);
        };
      }
    } catch (e) {
      // 忽略损坏的存储数据
    }
  }
}

// ============================================================
//  开始答题
// ============================================================
function startQuiz() {
  STATE.answers = new Array(STATE.totalQuestions).fill(null);
  STATE.currentQuestion = 0;
  STATE.mbtiResult = null;
  saveState();
  renderQuiz();
  showPage(pageQuiz);
}

// ============================================================
//  保存 / 读取状态到 localStorage
// ============================================================
function saveState() {
  const data = {
    questions: STATE.questions,
    answers: STATE.answers,
    currentQuestion: STATE.currentQuestion,
    totalQuestions: STATE.totalQuestions,
  };
  localStorage.setItem('mbti_quiz_state', JSON.stringify(data));
}

function clearState() {
  localStorage.removeItem('mbti_quiz_state');
}

// ============================================================
//  渲染答题页面
// ============================================================
function renderQuiz() {
  const q = STATE.questions[STATE.currentQuestion];
  const total = STATE.totalQuestions;
  const current = STATE.currentQuestion + 1;

  // 更新进度
  quizProgressLabel.textContent = `进度: 第 ${current} / ${total} 题`;
  quizDimension.textContent = `维度: ${q.dimension}`;
  // 显示维度中文名
  const dimNames = { 'E/I': '能量映射', 'S/N': '信息获取', 'T/F': '决策标准', 'J/P': '行动模式' };
  quizDimension.textContent = `${dimNames[q.dimension] || q.dimension} (${q.dimension})`;
  progressBar.style.width = `${(current / total) * 100}%`;

  // 更新题目
  questionTitle.textContent = `Q${q.id}. ${q.stem}`;
  questionContext.textContent = q.context || '';
  // 显示来源作品
  if (q.source) {
    questionContext.textContent += `\n—— ${q.source}`;
  }

  // 渲染选项
  optionsContainer.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.innerHTML = `
      <span class="option-letter">${opt.letter}</span>
      <span class="option-text">${opt.text}</span>
    `;
    card.addEventListener('click', () => selectOption(idx, card));
    optionsContainer.appendChild(card);
  });

  // 如果有已选答案，高亮
  const existingAnswer = STATE.answers[STATE.currentQuestion];
  if (existingAnswer !== null) {
    const cards = optionsContainer.querySelectorAll('.option-card');
    cards.forEach((card, i) => {
      if (STATE.questions[STATE.currentQuestion].options[i].letter === existingAnswer) {
        card.classList.add('selected');
      }
    });
  }

  // 第一题时隐藏上一题按钮
  if (current === 1) {
    btnPrev.style.visibility = 'hidden';
  } else {
    btnPrev.style.visibility = 'visible';
  }

  // 更新答案状态
  updateAnswerStatus();

  // 隐藏反馈
  selectionFeedback.classList.add('hidden');

  // 重新渲染 Lucide 图标
  if (window.lucide) lucide.createIcons();
}

function updateAnswerStatus() {
  const answered = STATE.answers.filter(a => a !== null).length;
  answerStatus.textContent = `已答 ${answered} / ${STATE.totalQuestions} 题`;
}

// ============================================================
//  选择选项
// ============================================================
function selectOption(optionIndex, cardElement) {
  if (STATE.isTransitioning) return;
  STATE.isTransitioning = true;

  const q = STATE.questions[STATE.currentQuestion];
  const selectedLetter = q.options[optionIndex].letter;

  // 移除其他选中状态
  const allCards = optionsContainer.querySelectorAll('.option-card');
  allCards.forEach(c => c.classList.remove('selected'));
  // 设置当前选中
  cardElement.classList.add('selected');

  // 保存答案
  STATE.answers[STATE.currentQuestion] = selectedLetter;
  saveState();
  updateAnswerStatus();

  // 显示反馈
  const feedbacks = [
    '已记录你的选择 ✦',
    '感受到了你的心意 ✦',
    '次元之力正在汇聚 ✦',
    '你的选择已被铭刻 ✦',
  ];
  selectionFeedback.textContent = feedbacks[Math.floor(Math.random() * feedbacks.length)];
  selectionFeedback.classList.remove('hidden');

  // 500ms 后自动跳转下一题
  setTimeout(() => {
    selectionFeedback.classList.add('hidden');
    if (STATE.currentQuestion < STATE.totalQuestions - 1) {
      // 滑动动画跳转
      animateToNextQuestion();
    } else {
      // 所有题目完成，计算结果
      calculateResult();
    }
    STATE.isTransitioning = false;
  }, 500);
}

// ============================================================
//  题目切换动画
// ============================================================
function animateToNextQuestion() {
  const questionArea = $('#questionArea');
  const optsArea = optionsContainer;

  // 滑出动画
  questionArea.style.transition = 'transform 0.35s ease-in, opacity 0.35s ease-in';
  questionArea.style.transform = 'translateX(-60px)';
  questionArea.style.opacity = '0';
  optsArea.style.transition = 'transform 0.35s ease-in, opacity 0.35s ease-in';
  optsArea.style.transform = 'translateX(-60px)';
  optsArea.style.opacity = '0';

  setTimeout(() => {
    STATE.currentQuestion++;
    renderQuiz();

    // 重置位置
    questionArea.style.transition = 'none';
    questionArea.style.transform = 'translateX(60px)';
    optsArea.style.transition = 'none';
    optsArea.style.transform = 'translateX(60px)';

    requestAnimationFrame(() => {
      questionArea.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
      questionArea.style.transform = 'translateX(0)';
      questionArea.style.opacity = '1';
      optsArea.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
      optsArea.style.transform = 'translateX(0)';
      optsArea.style.opacity = '1';
    });
  }, 350);
}

// ============================================================
//  MBTI 计分引擎
// ============================================================
function calculateResult() {
  showLoading('正在鉴定次元人格...');

  setTimeout(() => {
    const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    STATE.answers.forEach((answer, idx) => {
      if (!answer) return;
      const questionNum = idx + 1;

      if (questionNum <= 4) {
        // E/I 维度
        if (answer === 'A' || answer === 'B') scores.E += 1;
        else scores.I += 1;
      } else if (questionNum <= 8) {
        // S/N 维度
        if (answer === 'A' || answer === 'B') scores.S += 1;
        else scores.N += 1;
      } else if (questionNum <= 12) {
        // T/F 维度
        if (answer === 'A' || answer === 'B') scores.T += 1;
        else scores.F += 1;
      } else {
        // J/P 维度
        if (answer === 'A' || answer === 'B') scores.J += 1;
        else scores.P += 1;
      }
    });

    // 构建类型
    const type = [
      scores.E >= scores.I ? 'E' : 'I',
      scores.S >= scores.N ? 'S' : 'N',
      scores.T >= scores.F ? 'T' : 'F',
      scores.J >= scores.P ? 'J' : 'P',
    ].join('');

    STATE.mbtiResult = { type, scores };
    saveState();
    hideLoading();
    renderResult(type, scores);
  }, 1500);
}

// ============================================================
//  Canvas 粒子动画背景
// ============================================================
(function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouseX = -1000;
  let mouseY = -1000;
  let animationId;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 跟踪鼠标位置
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  document.addEventListener('mouseleave', () => {
    mouseX = -1000;
    mouseY = -1000;
  });

  // 创建粒子
  class Particle {
    constructor() {
      this.reset();
      this.y = Math.random() * canvas.height;
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + Math.random() * 100;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedY = Math.random() * 0.6 + 0.2;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.6 + 0.2;
      this.color = Math.random() < 0.3
        ? `rgba(255, 42, 133, ${this.opacity})`
        : `rgba(0, 240, 255, ${this.opacity})`;
      this.angle = Math.random() * Math.PI * 2;
      this.wobbleSpeed = Math.random() * 0.02 + 0.005;
      this.wobbleAmp = Math.random() * 0.5 + 0.2;
    }
    update() {
      this.y -= this.speedY;
      this.angle += this.wobbleSpeed;
      this.x += this.speedX + Math.sin(this.angle) * this.wobbleAmp;

      // 鼠标吸引效果（微弱）
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150 && dist > 0) {
        const force = (150 - dist) / 150 * 0.3;
        this.x += (dx / dist) * force;
        this.y += (dy / dist) * force;
      }

      if (this.y < -20 || this.x < -20 || this.x > canvas.width + 20) {
        this.reset();
      }
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      // 发光效果
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace(/[\d.]+\)$/, `${this.opacity * 0.3})`);
      ctx.fill();
    }
  }

  // 初始化粒子
  const particleCount = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 12000));
  for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw(ctx);
    });
    animationId = requestAnimationFrame(animate);
  }

  animate();

  // 窗口大小变化时调整粒子数量
  window.addEventListener('resize', () => {
    const newCount = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 12000));
    while (particles.length < newCount) {
      particles.push(new Particle());
    }
    while (particles.length > newCount) {
      particles.pop();
    }
  });
})();

}

document.addEventListener('DOMContentLoaded', initApp);

// ============================================================
//  键盘快捷键：1-4 选择选项
// ============================================================
document.addEventListener('keydown', (e) => {
  if (pageQuiz.classList.contains('active') && !STATE.isTransitioning) {
    const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3 };
    const idx = keyMap[e.key];
    if (idx !== undefined) {
      const cards = optionsContainer.querySelectorAll('.option-card');
      if (cards[idx]) {
        selectOption(idx, cards[idx]);
      }
    }
    // 左箭头：上一题
    if (e.key === 'ArrowLeft' && STATE.currentQuestion > 0) {
      btnPrev.click();
    }
  }
});
</script>

</body>
</html>
